<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Hub Communautaire</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --accent: #00d2ff;
      --discord-blurple: #5865F2;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      color: white; margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .profile-gif { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 15px var(--accent); }

    /* --- LAYOUT DOUBLE COLONNE --- */
    .main-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
      max-width: 1000px;
      justify-content: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
    }

    /* Colonne Vocale */
    .voice-col { flex: 1; min-width: 300px; max-width: 350px; text-align: center; }
    
    /* Colonne Chat */
    .chat-col { flex: 2; min-width: 350px; height: 500px; }

    .btn-join {
      display: block; background: var(--discord-blurple);
      color: white; padding: 12px; text-decoration: none;
      border-radius: 10px; font-weight: bold; margin-top: 15px;
      transition: 0.3s;
    }
    .btn-join:hover { transform: scale(1.03); background: #4752c4; }

    iframe { border: none; width: 100%; height: 100%; border-radius: 15px; }

    .mod-tag { color: #ffd700; font-weight: bold; margin-top: 10px; display: block; }
  </style>
</head>
<body>

  <div class="header">
    <img src="jonas.gif" alt="Logo" class="profile-gif" onerror="this.src='https://i.gifer.com/ZZ5H.gif'">
    <h1>Espace Communauté</h1>
    <span class="mod-tag">🛡️ Modérateur : Pacman</span>
  </div>

  <div class="main-container">
    
    <div class="box voice-col">
      <h3 style="margin-top:0; color: var(--accent);">🔊 SALONS VOCAUX</h3>
      <p style="font-size: 12px; opacity: 0.7;">Vois qui parle en direct :</p>
      <div style="height: 300px;">
        <iframe src="https://discord.com/widget?id=1437479306266939524&theme=dark" allowtransparency="true"></iframe>
      </div>
      <a href="https://discord.gg/CQgg8Pk9nz" class="btn-join" target="_blank">REJOINDRE LE VOCAL</a>
    </div>

    <div class="box chat-col">
      <h3 style="margin-top:0; color: var(--accent); text-align: center;">💬 TCHAT & GIFS</h3>
      <iframe src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

  </div>

  <p style="margin-top: 30px; font-size: 12px; opacity: 0.5;">Astuce : Pour envoyer un GIF, utilise l'icône dans la barre de message du chat.</p>

</body>
</html>
