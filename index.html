<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Dashboard</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
      --text-color: #333333;
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      --card-bg: #2d2d2d;
      --text-color: #ffffff;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .btn {
      display: inline-block;
      width: 80%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background: #5865F2;
    }
    .chat-area {
      margin-top: 20px;
      border-radius: 15px;
      overflow: hidden;
      height: 350px;
      border: 1px solid rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>jojordanos</h1>
    <a class="btn" href="https://www.youtube.com/@jojordanos" target="_blank" style="background:#FF0000;">YouTube</a>
    <a class="btn" href="https://discord.gg/votre_invite" target="_blank">Rejoindre Discord</a>

    <div style="margin-top:20px; font-weight:bold; font-size:12px; text-transform:uppercase;">Chat en direct</div>
    
    <div class="chat-area">
      <iframe src="https://e.widgetbot.io/channels/1437479306266939524/1437479306266939524" height="100%" width="100%" frameborder="0"></iframe>
    </div>
  </div>

</body>
</html>
