<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Dashboard</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
      --text-color: #333333;
      --title-color: #666666;
      --border-color: #dddddd;
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      --card-bg: #2d2d2d;
      --text-color: #ffffff;
      --title-color: #aaaaaa;
      --border-color: #444444;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 380px;
      text-align: center;
      position: relative;
    }
    .theme-toggle {
      position: absolute; top: 15px; right: 15px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-color);
    }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .btn {
      flex: 1; min-width: 100px; padding: 12px; border-radius: 12px;
      text-decoration: none; color: white; font-weight: bold; font-size: 14px;
      transition: 0.3s;
    }
    .youtube { background: #FF0000; }
    .discord { background: #5865F2; }
    .mail { background: #0078D4; }
    .copy-box {
      background: rgba(0,0,0,0.05); border: 1px dashed var(--border-color);
      padding: 10px; border-radius: 10px; margin: 15px 0; cursor: pointer;
    }
    .section-title {
      font-size: 12px; font-weight: bold; color: var(--title-color);
      margin: 20px 0 10px; text-transform: uppercase;
      display: flex; justify-content: space-between;
    }
    #online-count { background: #23a55a; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-grid img { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <button class="theme-toggle" id="themeBtn">🌓</button>
    <h1>jojordanos</h1>
    <div class="buttons">
      <a class="btn youtube" href="https://www.youtube.com/@jojordanos" target="_blank">YouTube</a>
      <a class="btn discord" href="https://discord.gg/TON_INVITE" target="_blank">Discord</a>
      <a class="btn mail" href="mailto:jonasjeanniard@outlook.fr">Outlook</a>
    </div>
    <div class="section-title">Mon Pseudo / IP</div>
    <div class="copy-box" onclick="copyText('jojordanos#0000')">
      <span id="copyLabel">jojordanos#0000</span>
    </div>
    <div class="section-title">quelques Vidéos</div>
    <div class="photo-grid">
      <a href="https://www.youtube.com/watch?v=v4yKcQtYszs" target="_blank"><img src="https://img.youtube.com/vi/v4yKcQtYszs/mqdefault.jpg"></a>
      <a href="https://www.youtube.com/watch?v=O8M5MxS4hyk" target="_blank"><img src="https://img.youtube.com/vi/O8M5MxS4hyk/mqdefault.jpg"></a>
    </div>
    <div class="section-title">Discord <span id="online-count">Chargement...</span></div>
    <iframe src="https://discord.com/widget?id=1437479306266939524&theme=dark" width="100%" height="200" allowtransparency="true" frameborder="0" style="border-radius:10px;"></iframe>
  </div>
  <script>
    function copyText(text) {
      navigator.clipboard.writeText(text);
      document.getElementById('copyLabel').innerText = "Copié !";
      setTimeout(() => { document.getElementById('copyLabel').innerText = text; }, 2000);
    }
    const btn = document.getElementById('themeBtn');
    btn.addEventListener('click', () => {
      let theme = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
    });
    async function updateDiscordStatus() {
      try {
        const res = await fetch('https://discord.com/api/guilds/1437479306266939524/widget.json');
        const data = await res.json();
        document.getElementById('online-count').innerText = data.presence_count + " EN LIGNE";
      } catch (e) {}
    }
    updateDiscordStatus();
  </script>
</body>
</html>
