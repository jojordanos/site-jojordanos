<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Official Site</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
      color: var(--text-color);
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 30px; border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      width: 100%; max-width: 480px; text-align: center;
      animation: float 6s ease-in-out infinite;
    }

    h1 { 
      margin: 0; font-size: 2.5em; 
      background: linear-gradient(to right, #00d2ff, #3a7bd5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .sub-counter {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 10px; margin: 15px 0;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn {
      display: block; padding: 15px; margin: 10px 0; border-radius: 15px;
      text-decoration: none; color: white; font-weight: bold;
      transition: all 0.3s ease; text-transform: uppercase;
    }

    .yt { background: #FF0000; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3); }
    .yt:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5); }

    .chat-container {
      margin-top: 25px; border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1); 
      height: 400px; background: #2f3136;
    }
    
    /* Style pour l'adresse mail */
    .contact-mail {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      display: inline-block;
      transition: color 0.3s;
    }
    .contact-mail:hover { color: #00d2ff; }

    iframe { border: none; width: 100%; height: 100%; }

    .bg-dots {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 30px 30px;
    }
  </style>
</head>
<body>

  <div class="bg-dots"></div>

  <div class="card">
    <h1>jojordanos</h1>
    <div style="color: #23a55a; font-size: 14px; font-weight: bold;">● ONLINE</div>

    <div class="sub-counter">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" width="30" alt="YT">
      <span>Abonnés : </span>
      <span style="font-weight: bold; color: #FF0000;">15+</span>
    </div>
    
    <a href="https://www.youtube.com/@jojordanos" class="btn yt" target="_blank">🎬 S'ABONNER</a>
    
    <div style="margin: 20px 0 10px; font-weight:bold; font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing: 2px;">
      COMMUNITY CHAT
    </div>
    
    <div class="chat-container">
      <iframe src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

    <a href="mailto:jonasjeanniard@outlook.fr" class="contact-mail">
      📧 Contact : jonasjeanniard@outlook.fr
    </a>

    <p style="font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 20px;">
      © 2026 jojordanos
    </p>
  </div>

</body>
</html>
