<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Hub Officiel</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.08);
      --accent: #00d2ff;
      --discord-blurple: #5865F2;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient); color: white;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
    }

    .card {
      background: var(--card-bg); backdrop-filter: blur(15px);
      padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 550px; text-align: center;
    }

    .profile-gif { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; }

    /* BOUTON YOUTUBE ROUGE */
    .btn-yt {
      display: block; background: #FF0000; color: white; padding: 12px;
      text-decoration: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    }

    /* ZONE DE CHAT (POUR DISCUTER) */
    .chat-box {
      height: 400px; border-radius: 20px; overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.1); background: #2f3136; margin-bottom: 20px;
    }

    /* ZONE VOCALE (QUI EST EN LIGNE) */
    .voice-box {
      background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px;
      border: 1px solid var(--discord-blurple);
    }

    iframe { border: none; width: 100%; height: 100%; }
    
    .btn-join-vocal {
      display: inline-block; margin-top: 10px; color: var(--accent);
      text-decoration: none; font-weight: bold; font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="jonas.gif" alt="Logo" class="profile-gif" onerror="this.src='https://i.gifer.com/ZZ5H.gif'">
    <h1 style="margin:0;">jojordanos</h1>
    <p style="color: #23a55a; font-weight: bold; font-size: 14px; margin-bottom: 20px;">● CHAÎNE OFFICIELLE</p>

    <a href="https://www.youtube.com/@jojordanos" class="btn-yt" target="_blank">S'ABONNER À LA CHAÎNE</a>

    <div class="chat-box">
      <iframe src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

    <div class="voice-box">
      <div style="font-size: 11px; color: var(--discord-blurple); font-weight: bold; margin-bottom: 8px;">🔊 SALONS VOCAUX</div>
      <iframe src="https://discord.com/widget?id=1437479306266939524&theme=dark" height="150" allowtransparency="true"></iframe>
      <br>
      <a href="https://discord.gg/CQgg8Pk9nz" class="btn-join-vocal" target="_blank">Rejoindre le Vocal 🔊</a>
    </div>

    <div style="margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
      <span style="font-size: 11px; opacity: 0.5;">MODÉRATEUR</span><br>
      <span style="color: #ffd700; font-weight: bold;">🛡️ Pacman</span>
    </div>
  </div>

</body>
</html>
