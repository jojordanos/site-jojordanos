<!doctype html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Site Officiel</title>

    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
    }
    .card {
      background: var(--card-bg); padding: 25px; border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center;
    }
    .btn {
      display: block; padding: 12px; margin: 10px 0; border-radius: 12px;
      text-decoration: none; color: white; font-weight: bold; background: #FF0000;
    }
    .chat-container {
      margin-top: 20px; border-radius: 15px; overflow: hidden;
      border: 1px solid #eee; height: 450px; background: #ffffff;
    }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="card">
