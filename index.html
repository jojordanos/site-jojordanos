<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Official Site</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
      --accent: #00d2ff;
    }

    /* --- CURSEUR ÉPÉE --- */
    html, body {
      cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), auto !important;
    }
    
    a, button, .btn, iframe {
      cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), pointer !important;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
      color: var(--text-color);
      overflow-x: hidden;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 30px; border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      width: 100%; max-width: 480px; text-align: center;
      animation: float 6s ease-in-out infinite;
      margin-bottom: 120px;
    }

    .profile-img {
      width: 120px; height: 120px; border-radius: 50%;
      border: 3px solid var(--accent); box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
      margin-bottom: 15px; object-fit: cover;
    }

    h1 { 
      margin: 0; font-size: 2.2em; 
      background: linear-gradient(to right, #00d2ff, #3a7bd5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* --- SYSTÈME D'ONGLETS POUR LE CHAT --- */
    .chat-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .tab-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 15px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .tab-btn:hover, .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .chat-container {
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1); 
      height: 350px; background: #2f3136;
    }
    
    .music-player-bar {
      position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 90%; max-width: 600px; height: 80px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 20px; border: 1px solid var(--accent);
      overflow: hidden; z-index: 1000;
    }

    .mods-section {
      margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 15px;
    }

    .mod-name { font-size: 16px; color: #ffd700; font-weight: bold; }

    iframe { border: none; width: 100%; height: 100%; }

    .bg-dots {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 30px 30px;
    }
  </style>
</head>
<body>

  <div class="bg-dots"></div>

  <div class="card">
    <img src="j.jpg" alt="Logo jojordanos" class="profile-img">
    <h1>jojordanos</h1>
    <div style="color: #23a55a; font-size: 14px; font-weight: bold;">● SITE OFFICIEL</div>

    <div class="chat-tabs">
      <button class="tab-btn active" onclick="changeChat('1437479308305109073', this)">Général</button>
      <button class="tab-btn" onclick="changeChat('1305802290770481154', this)">Nouveau Salon</button>
    </div>
    
    <div class="chat-container">
      <iframe id="discord-chat" src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

    <div class="mods-section">
      <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 5px;">Modérateur</div>
      <div class="mod-name">🛡️ Pacman</div>
    </div>

    <a href="mailto:jonasjeanniard@outlook.fr" style="margin-top:15px; display:inline-block; color:rgba(255,255,255,0.5); text-decoration:none; font-size:12px;">
      📧 Contact : jonasjeanniard@outlook.fr
    </a>
  </div>

  <div class="music-player-bar">
    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/O8M5MxS4hyk" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <script>
    function changeChat(channelId, btn) {
      // Changer la source de l'iframe
      document.getElementById('discord-chat').src = "https://e.widgetbot.io/channels/1437479306266939524/" + channelId + "?api=1";
      
      // Gérer l'apparence des boutons
      let buttons = document.querySelectorAll('.tab-btn');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
