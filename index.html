<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Dashboard & Chat</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
      --text-color: #333333;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
    }
    .card {
      background: var(--card-bg); padding: 25px; border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
    }
    .btn {
      display: block; padding: 12px; margin: 10px 0; border-radius: 12px;
      text-decoration: none; color: white; font-weight: bold; background: #5865F2;
    }
    .chat-container { margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; height: 350px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>jojordanos</h1>
    <a href="https://www.youtube.com/@jojordanos" class="btn" style="background:#FF0000;">YouTube</a>
    
    <div style="margin: 20px 0 10px; font-weight: bold; font-size: 12px;">CHAT DISCORD EN DIRECT</div>
    
    <div class="chat-container">
      <widgetbot
        server="1437479306266939524"
        channel="1437479308305109073"
        width="100%"
        height="100%"
      ></widgetbot>
    </div>
  </div>
  <script src="https://widgetbot.io/embed.js"></script>
</body>
</html>
