<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Site Officiel</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
      --text-color: #333333;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    h1 { margin-bottom: 5px; color: #333; }
    .status { color: #23a55a; font-size: 13px; font-weight: bold; margin-bottom: 20px; }
    .btn {
      display: block;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.03); }
    .yt { background: #FF0000; }
    .chat-container {
      margin-top: 20px;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid #eee;
      height: 400px; /* Hauteur du chat */
      background: #f9f9f9;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>jojordanos</h1>
    <div class="status">● SITE OFFICIEL</div>
    
    <a href="https://www.youtube.com/@jojordanos" class="btn yt" target="_blank">MA CHAÎNE YOUTUBE</a>
    
    <div style="margin: 20px 0 10px; font-weight: bold; font-size: 12px; color: #888; text-transform: uppercase;">Discussion en direct</div>
    
    <div class="chat-container">
      <widgetbot
        server="1437479306266939524"
        channel="1437479308305109073"
        width="100%"
        height="100%"
      ></widgetbot>
    </div>
  </div>

  <script src="https://widgetbot.io/embed.js"></script>

</body>
</html>
