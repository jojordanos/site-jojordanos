<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Official Site</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
      --accent: #00d2ff;
    }

    /* CURSEUR ÉPÉE */
    html, body { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), auto !important; }
    a, button, .btn, iframe { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), pointer !important; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient); background-size: 400% 400%;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px; color: var(--text-color);
    }

    .card {
      background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center;
      margin-bottom: 120px;
    }

    .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; object-fit: cover; }

    .chat-tabs { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
    .tab-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); border-color: var(--accent); }

    /* CADRE DU CHAT */
    .chat-container { 
      border-radius: 20px; 
      overflow: hidden; 
      height: 450px; /* On augmente la taille */
      background: #2f3136; 
      border: 2px solid rgba(255, 255, 255, 0.1);
      margin-top: 10px;
    }

    .music-player-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; height: 80px; background: rgba(0, 0, 0, 0.9); border-radius: 20px; border: 1px solid var(--accent); overflow: hidden; z-index: 1000; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="card">
    <img src="j.jpg" alt="Logo" class="profile-img">
    <h1 style="margin:0; font-size: 2.5em;">jojordanos</h1>
    
    <div style="color: #23a55a; font-size: 14px; font-weight: bold; margin-bottom: 15px;">● SITE OFFICIEL EN LIGNE</div>

    <div class="chat-tabs">
      <button class="tab-btn active" onclick="changeChat('1437479308305109073', this)">Général</button>
      <button class="tab-btn" onclick="changeChat('1305802290770481154', this)">Nouveau Salon</button>
    </div>
    
    <div class="chat-container">
      <iframe id="discord-chat" src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

    <div style="margin-top:20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px;">
        <div style="font-size: 10px; color: rgba(255,255,255,0.5);">MODÉRATEUR</div>
        <div style="color: #ffd700; font-weight: bold; font-size: 18px;">🛡️ Pacman</div>
    </div>
  </div>

  <div class="music-player-bar">
    <iframe src="https://www.youtube.com/embed/O8M5MxS4hyk" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  </div>

  <script>
    function changeChat(channelId, btn) {
      document.getElementById('discord-chat').src = "https://e.widgetbot.io/channels/1437479306266939524/" + channelId + "?api=1";
      let buttons = document.querySelectorAll('.tab-btn');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
