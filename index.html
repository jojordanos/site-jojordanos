<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Official Site</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.1);
      --text-color: #ffffff;
      --accent: #00d2ff;
    }

    /* CURSEUR ÉPÉE */
    html, body { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), auto !important; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px; color: var(--text-color);
    }

    .card {
      background: var(--card-bg); backdrop-filter: blur(20px);
      padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 50px rgba(0,0,0,0.6); width: 100%; max-width: 400px; text-align: center;
      margin-top: 50px;
    }

    .profile-img { 
      width: 150px; height: 150px; border-radius: 50%; 
      border: 4px solid var(--accent); margin-bottom: 20px; 
      object-fit: cover; box-shadow: 0 0 20px var(--accent);
    }

    h1 { margin: 0; font-size: 2.5em; letter-spacing: 2px; }

    .btn-yt {
      display: block; background: #FF0000; color: white; padding: 15px;
      text-decoration: none; border-radius: 15px; font-weight: bold; margin: 20px 0;
      transition: 0.3s;
    }
    .btn-yt:hover { transform: scale(1.05); background: #cc0000; }

    .mod-box {
      background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;
      border: 1px solid #ffd700; margin-top: 20px;
    }

    /* Barre de musique discrète en haut */
    .music-top {
      width: 100%; max-width: 400px; height: 80px; margin-bottom: 20px;
      border-radius: 15px; overflow: hidden; border: 1px solid var(--accent);
    }
  </style>
</head>
<body>

  <div class="music-top">
    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/O8M5MxS4hyk" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  </div>

  <div class="card">
    <img src="j.jpg" alt="jojordanos" class="profile-img">
    <h1>jojordanos</h1>
    <p style="color: #23a55a; font-weight: bold;">● CHAÎNE OFFICIELLE</p>

    <a href="https://www.youtube.com/@jojordanos" class="btn-yt" target="_blank">S'ABONNER À LA CHAÎNE</a>

    <div class="mod-box">
      <span style="font-size: 10px; opacity: 0.6;">MODÉRATEUR</span><br>
      <span style="color: #ffd700; font-size: 2px; font-weight: bold;">Pacman aussi surnommée pacdev</span>
    </div>

    <div style="margin-top: 20px;">
       <a href="https://discord.gg/CQgg8Pk9nz" style="color: var(--accent); text-decoration: none; font-weight: bold;">Rejoindre le Discord 🔊</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@widgetbot/crate@3" async defer>
    new WidgetBot({
      server: '1437479306266939524',
      channel: '1437479308305109073'
    })
  </script>

</body>
</html>
