<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Dashboard</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: #ffffff;
      --text-color: #333333;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 350px;
      text-align: center;
    }
    h1 { margin-bottom: 5px; font-size: 28px; }
    .status { color: #23a55a; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
    .btn {
      display: block;
      padding: 15px;
      margin: 10px 0;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }
    .yt { background: #FF0000; }
    .dc { background: #5865F2; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .video-grid img { width: 100%; border-radius: 10px; border: 2px solid #eee; }
  </style>
</head>
<body>

  <div class="card">
    <h1>jojordanos</h1>
    <div class="status">● EN LIGNE</div>

    <a href="https://www.youtube.com/@jojordanos" class="btn yt" target="_blank">MA CHAÎNE YOUTUBE</a>
    <a href="https://discord.gg/votre_invite" class="btn dc" target="_blank">MON SERVEUR DISCORD</a>

    <div style="margin-top: 25px; font-weight: bold; font-size: 12px; color: #888;">DERNIÈRES VIDÉOS</div>
    <div class="video-grid">
      <a href="https://www.youtube.com/watch?v=v4yKcQtYszs" target="_blank">
        <img src="https://img.youtube.com/vi/v4yKcQtYszs/mqdefault.jpg" alt="Video 1">
      </a>
      <a href="https://www.youtube.com/watch?v=O8M5MxS4hyk" target="_blank">
        <img src="https://img.youtube.com/vi/O8M5MxS4hyk/mqdefault.jpg" alt="Video 2">
      </a>
    </div>
  </div>

</body>
</html>
