
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Hub Anime</title>
  <style>
    :root {
      --accent: #00d2ff;
      --discord-blurple: #5865F2;
    }

    /* --- CURSEUR ÉPÉE --- */
    html, body { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), auto !important; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0; padding: 20px; color: white;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      
      /* --- FOND ANIME FIXE --- */
      background: url('https://wallpaperaccess.com/full/266210.jpg') no-repeat center center fixed; 
      background-size: cover;
    }

    /* Superposition sombre pour que le fond ne soit pas trop brillant */
    body::before {
      content: "";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5); /* Assombrit l'image d'arrière-plan */
      z-index: -1;
    }

    .card {
      background: rgba(15, 12, 41, 0.85); /* Fond de carte sombre et semi-transparent */
      backdrop-filter: blur(10px);
      padding: 30px; border-radius: 30px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.4);
      width: 100%; max-width: 550px; text-align: center;
      margin-top: 20px;
    }

    .profile-gif { 
      width: 120px; height: 120px; border-radius: 50%; 
      border: 4px solid var(--accent); margin-bottom: 15px; 
      box-shadow: 0 0 20px var(--accent);
      object-fit: cover;
    }

    .btn-yt {
      display: block; background: #FF0000; color: white; padding: 12px;
      text-decoration: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.5);
    }

    .chat-box {
      height: 400px; border-radius: 20px; overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.1); background: #2f3136; margin-bottom: 20px;
    }

    .voice-box {
      background: rgba(0,0,0,0.6); border-radius: 20px; padding: 15px;
      border: 1px solid var(--discord-blurple);
    }

    iframe { border: none; width: 100%; height: 100%; }
    
    .btn-join-vocal {
      display: inline-block; margin-top: 10px; color: var(--accent);
      text-decoration: none; font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="jonas.gif" alt="Logo" class="profile-gif" onerror="this.src='https://i.gifer.com/ZZ5H.gif'">
    
    <h1 style="margin:0; font-size: 2.5em; letter-spacing: 2px;">jojordanos</h1>
    <p style="color: #00ff88; font-weight: bold; margin-bottom: 20px;">● ONLINE HUB</p>

    <a href="https://www.youtube.com/@jojordanos" class="btn-yt" target="_blank">S'ABONNER À LA CHAÎNE</a>

    <div class="chat-box">
      <iframe src="https://e.widgetbot.io/channels/1437479306266939524/1437479308305109073?api=1"></iframe>
    </div>

    <div class="voice-box">
      <div style="font-size: 11px; color: var(--discord-blurple); font-weight: bold; margin-bottom: 8px;">🔊 SALONS VOCAUX</div>
      <iframe src="https://discord.com/widget?id=1437479306266939524&theme=dark" height="150" allowtransparency="true"></iframe>
      <br>
      <a href="https://discord.gg/CQgg8Pk9nz" class="btn-join-vocal" target="_blank">Rejoindre le Vocal 🔊</a>
    </div>

    <div style="margin-top:20px; padding-top: 15px;">
      <span style="color: #ffd700; font-weight: bold; font-size: 18px;">🛡️ Pacman</span>
    </div>
  </div>

</body>
</html>
