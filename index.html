<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>jojordanos | Official Site</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
      --accent: #00d2ff;
    }

    /* CURSEUR ÉPÉE */
    html, body { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), auto !important; }
    a, button, .btn, iframe { cursor: url('https://cur.cursors-4u.net/games/gam-4/gam373.cur'), pointer !important; }

    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-gradient); background-size: 400% 400%;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px; color: var(--text-color);
    }

    .card {
      background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 480px; text-align: center;
      animation: float 6s ease-in-out infinite; margin-bottom: 120px;
    }

    .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; object-fit: cover; }

    .chat-tabs { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
    .tab-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .chat-container { border-radius: 20px; overflow: hidden; height: 300px; background: #2f3136; border: 1px solid rgba(255, 255, 255, 0.1); }

    .voice-section { margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; border: 1px solid rgba(0, 210, 255, 0.2); }
    .voice-title { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
    
    .btn-join-voice {
      display: inline-block; background: #5865F2; color: white; padding: 10px 20px; 
      border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: bold; margin-top: 10px;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-join-voice:hover { transform: scale(1.05); background: #4752c4; }

    .music-player-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; height: 80px; background: rgba(0, 0, 0, 0.8); border-radius: 20px; border: 1px solid var(--accent); overflow: hidden; z-index: 1000; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="card">
    <img src="j.jpg" alt="Logo" class="profile-img">
    <h1 style="margin:0; font-size: 2em;">jojordanos</h1>
    
    <div class="chat-tabs">
      <button class="tab-btn active" onclick="changeChat('1437479308305109073', this)">Général</button>
      <button class="tab-btn" onclick="changeChat('1305802290770481154', this)">Nouveau Salon</button>
